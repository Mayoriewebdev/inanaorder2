<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

</head>

<body>


   <section class="order-section" data-aos="fade-up">

        <div class="order-container">

            <!-- Logo -->
            <div class="logo" data-aos="fade-right" data-aos-delay="100">
                <a href="javascript:void(0)">
                    <img src="images/Logo.png" alt="Inana Food">
                </a>
            </div>

            <!-- Steps -->
            <div class="steps" data-aos="fade-up" data-aos-delay="200">

                <div class="step">1</div>

                <div class="step-line"></div>

                <div class="step active">2</div>

                <div class="step-line"></div>

                <div class="step">3</div>

            </div>

            <!-- Title -->
            <div class="title-box" data-aos="fade-up" data-aos-delay="300">

                <a href="javascript:void(0)">
                    <img src="images/Choose.png" class="title-img">
                </a>

                <a href="javascript:void(0)">
                    <img src="images/Min carton.png" class="subtitle-img">
                </a>

            </div>

            <!-- Products -->
            <div class="product-grid" data-aos="zoom-in" data-aos-delay="400">

                <a href="#" class="product-card" data-price="images/total text.png">
                    <img src="images/25,000.png" class="product-img">
                    <div class="carton-badge">1 Carton</div>
                </a>

                <a href="#" class="product-card active" data-price="images/80k.png">
                    <img src="images/80.0000.png" class="product-img">
                    <div class="carton-badge">1 Carton</div>
                </a>

                <a href="#" class="product-card" data-price="images/105k.png">
                    <img src="images/105,000.png" class="product-img">
                    <div class="carton-badge">1 Carton</div>
                </a>

                <a href="#" class="product-card" data-price="images/150.png">
                    <img src="images/150,000.png" class="product-img">
                    <div class="carton-badge">1 Carton</div>
                </a>

            </div>

            <!-- Bottom Section -->
            <div class="bottom-section" data-aos="fade-up" data-aos-delay="500" data-aos-duration="600"
                data-aos-once="true">

                <div class="total-price">
                    <a href="javascript:void(0)">
                        <img src="images/total text.png" class="total-img" id="totalPriceImg">
                    </a>
                </div>

                <a href="javascript:void(0)" class="proceed-btn">
                    <img src="images/proceed.png" class="btn-img">
                </a>

            </div>

        </div>

    </section>


     <script src="order2.js"></script>


<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
</script>




    <script>

        const cards = document.querySelectorAll(".product-card");

        cards.forEach(card => {
            card.addEventListener("click", () => {

                cards.forEach(c => {
                    c.classList.remove("active");
                });

                card.classList.add("active");

            });
        });

    </script>





</body>

</html>
